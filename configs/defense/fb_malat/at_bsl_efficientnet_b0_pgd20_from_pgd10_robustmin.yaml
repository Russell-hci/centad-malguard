model: efficientnet_b0
method: at_bsl_pgd20_from_pgd10_robustmin

train_csv: datasets/splits_duplicate_aware/train.csv
val_csv: datasets/splits_duplicate_aware/val.csv
test_csv: datasets/splits_duplicate_aware/test.csv

batch_size: 20
eval_batch_size: 24
num_workers: 8
image_size: 224

epochs: 12
learning_rate: 0.00001
optimizer: adamw
weight_decay: 0.0001
grad_clip: 1.0

scheduler:
  name: cosine
  finetune_t_max: 12
  eta_min: 0.000001

early_stopping:
  patience: 4
  min_delta: 0.0005

loss:
  name: balanced_softmax
  lambda_clean: 0.15
  lambda_adv: 1.0

adversarial_training:
  pgd:
    epsilon: 0.03
    alpha: 0.003
    steps: 20
    random_start: true

validation:
  selection_metric: val_robust_min_macro_f1
  attacks:
    - name: pgd20
      attack: pgd
      epsilon: 0.03
      alpha: 0.003
      steps: 20
      random_start: true
    - name: pgd50
      attack: pgd
      epsilon: 0.03
      alpha: 0.003
      steps: 50
      random_start: true

balanced_sampler: true
augmentation:
  translate: 0.02
  gaussian_noise_std: 0.0

seed: 51
deterministic: true
cudnn_benchmark: false
device: auto
pretrained: false
finetune_trainable_layers: all
initial_checkpoint_path: results/fb_malat/finalists/efficientnet_pgd10_current_best_snapshot_20260612T1927Z/best_model.pth
output_dir: results/fb_malat/training
