model: mobilenet_v3_small
train_csv: datasets/splits_duplicate_aware/train.csv
val_csv: datasets/splits_duplicate_aware/val.csv
test_csv: datasets/splits_duplicate_aware/test.csv
batch_size: 32
num_workers: 8
image_size: 224
epochs_head: 0
epochs_finetune: 5
finetune_trainable_layers: all
learning_rate_head: 0.001
learning_rate_finetune: 0.0001
optimizer: adam
scheduler:
  name: cosine
  head_t_max: 1
  finetune_t_max: 5
  eta_min: 0.0
early_stopping:
  patience: 3
  min_delta: 0.0
weighted_loss: false
seed: 42
deterministic: true
cudnn_benchmark: false
device: auto
output_dir: results/defenses/adversarial_training
pretrained: false
initial_checkpoint_path: results/baseline_duplicate_aware/mobilenet_v3_small_20260601T100108Z/best_model.pth
baseline_metrics_path: results/baseline_duplicate_aware/mobilenet_v3_small_20260601T100108Z/metrics.csv
dataset_manifest_path: manifests/dataset_manifest.json
split_manifest_path: manifests/split_manifest_duplicate_aware.json
adversarial_training:
  adversarial_fraction: 0.5
  pgd:
    epsilon: 0.03
    alpha: 0.003
    steps: 10
    random_start: true
